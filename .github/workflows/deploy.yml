name: Deploy to Contabo VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Navigate to the project directory, or clone it if it doesn't exist
            if [ ! -d "/app/processo-de-importacao" ]; then
              cd /app || exit 1
              git clone https://github.com/cesarfois/Importa-o.git processo-de-importacao
            fi
            cd /app/processo-de-importacao || exit 1
            
            # Pull latest code
            git pull origin main
            
            # Ensure persistent directories and files exist on the host
            mkdir -p wfd_definitions exports
            [ -f schedules.json ] || echo "[]" > schedules.json
            [ -f history.json ] || echo "[]" > history.json
            [ -f tokens.json ] || echo "{}" > tokens.json
            
            # Rebuild and start container
            docker compose up -d --build
